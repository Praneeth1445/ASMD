<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Results screen preview</title>
  <desc id="desc">Stylized preview of the validation results table.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="54" y="40" width="1172" height="640" rx="20" fill="#ffffff" stroke="#dbe3ef" />
  <rect x="54" y="40" width="1172" height="68" rx="20" fill="#f8fafc" />
  <line x1="54" y1="108" x2="1226" y2="108" stroke="#dbe3ef" />
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#475569" font-weight="700">
    <text x="82" y="82">Image</text>
    <text x="270" y="82">Regulation</text>
    <text x="450" y="82">Question Marks</text>
    <text x="650" y="82">Calc. Total</text>
