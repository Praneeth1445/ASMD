    <text x="920" y="82">Bubble Total</text>
    <text x="1040" y="82">Status</text>
    <text x="1150" y="82">Remarks</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">
    <rect x="82" y="150" width="56" height="36" rx="8" fill="#fef3c7" />
    <text x="106" y="173" text-anchor="middle">R23</text>
    <rect x="450" y="144" width="84" height="28" rx="14" fill="#eef2ff" />
    <text x="492" y="163" text-anchor="middle">Q1: 2</text>
