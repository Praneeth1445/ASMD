    <rect x="82" y="382" width="56" height="36" rx="8" fill="#e2e8f0" />
    <text x="106" y="405" text-anchor="middle">A3</text>
    <rect x="450" y="376" width="84" height="28" rx="14" fill="#eef2ff" />
    <text x="492" y="395" text-anchor="middle">Q1: 8</text>
    <rect x="450" y="412" width="84" height="28" rx="14" fill="#eef2ff" />
