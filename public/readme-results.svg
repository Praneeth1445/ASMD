    <text x="660" y="410" text-anchor="middle" font-size="28" font-weight="700">31</text>
    <text x="804" y="410" text-anchor="middle" font-size="28" font-weight="700">31</text>
    <text x="936" y="410" text-anchor="middle" font-size="28" font-weight="700">31</text>
    <rect x="1020" y="378" width="110" height="34" rx="17" fill="#22c55e" />
    <text x="1075" y="401" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">PASSED</text>
    <text x="1158" y="403" font-size="15" fill="#64748b">All totals match</text>
