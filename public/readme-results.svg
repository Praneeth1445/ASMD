    <text x="492" y="199" text-anchor="middle">Q2: 0</text>
    <text x="660" y="178" text-anchor="middle" font-size="28" font-weight="700">38</text>
    <text x="804" y="178" text-anchor="middle" font-size="28" font-weight="700">38</text>
    <text x="936" y="178" text-anchor="middle" font-size="28" font-weight="700">38</text>
    <rect x="1020" y="146" width="110" height="34" rx="17" fill="#22c55e" />
    <text x="1075" y="169" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">PASSED</text>
    <text x="1158" y="171" font-size="15" fill="#64748b">All totals match</text>
  </g>
  <line x1="54" y1="340" x2="1226" y2="340" stroke="#e2e8f0" />
