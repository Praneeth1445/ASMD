<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Upload screen preview</title>
  <desc id="desc">Stylized preview of the image upload interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="80" y="70" width="1120" height="88" rx="18" fill="#ffffff" stroke="#e2e8f0" />
  <rect x="116" y="96" width="40" height="40" rx="12" fill="#2b6de8" />
  <path d="M136 107v16M128 115h16" stroke="#fff" stroke-width="4" stroke-linecap="round" />
  <text x="175" y="113" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Exam Sheet Validator</text>
  <text x="175" y="136" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">OCR-powered answer sheet validation</text>
